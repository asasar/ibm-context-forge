name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main


jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Check out IBM/mcp-context-forge
        uses: actions/checkout@main
        with:
          repository: IBM/mcp-context-forge
          path: remote-mcp-context-forge

      # - name: Run Tree
      #   run: |
      #     tree

      # - name: Run Tree
      #   run: |
      #     tree remote-mcp-context-forge/charts/mcp-stack

      # - name: Deploy cloudflare
      #   run: |
      #     kubectl apply -f k3d-manifests/cloudflare/deploy-cloudflare-pod.yaml

      # - name: Deploy nginx-sample
      #   run: |
      #     kubectl apply -f k3d-manifests/samples-deploy/

      # - name: Deploy nginx-sample
      #   run: |
      #     kubectl get pod -n nginx-sample

      - name: Deploy IBM Context Forge
        run: |
          cd remote-mcp-context-forge/charts/mcp-stack
          helm upgrade --install mcp-context-forge . \
            --namespace mcp-context-forge \
            --create-namespace \
            -f values.yaml \
            --set pgadmin.enabled=false \
            --set pgbouncer.enabled=true \
            --set mcpContextForge.replicaCount=1 \
            --set postgres.credentials.user=postgres \
            --set mcpContextForge.config.APP_DOMAIN=https://ibmcontextforge.cloudhomelab.uk \
            --set mcpContextForge.pluginConfig.enabled=true \
            --set mcpContextForge.hpa.enabled=false \
            --set mcpContextForge.metrics.enabled=false \
            --set mcpContextForge.metrics.serviceMonitor.enabled=false \
            --set mcpContextForge.secret.BASIC_AUTH_PASSWORD=${{ vars.BASIC_AUTH_PASSWORD  }}  \
            --set mcpContextForge.secret.PLATFORM_ADMIN_PASSWORD=${{ vars.PLATFORM_ADMIN_PASSWORD  }} \
            --set mcpContextForge.secret.SSO_ENTRA_CLIENT_ID=${{ vars.SSO_ENTRA_CLIENT_ID  }} \
            --set mcpContextForge.secret.SSO_ENTRA_CLIENT_SECRET=${{ secrets.SSO_ENTRA_CLIENT_SECRET  }} \
            --set mcpContextForge.secret.SSO_ENTRA_TENANT_ID=${{ vars.SSO_ENTRA_TENANT_ID  }}
            

      - name: Deploy
        run: |
          kubectl get all -n mcp-context-forge
